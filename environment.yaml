10. **Export Environment for Sharing**:
    If you used `pip` to install dependencies, export the environment for others to replicate:
    ```bash
    conda env export > environment.yml
    ```
    Edit the generated `environment.yml` to remove platform-specific paths (e.g., `prefix`) and commit it to GitHub.

### Additional Notes
- **Why Python 3.10?**: It's a stable version compatible with all listed dependencies as of September 2025. If you need a different version, adjust `python=3.10` in the `conda create` command or `environment.yml`.
- **Conda vs. pip**: Using `environment.yml` with Conda channels is preferred for reproducibility, but `pip install -r requirements.txt` is simpler if you want to stick with the provided file. The hybrid approach in the `environment.yml` above balances both.
- **Troubleshooting**:
  - If `sentence-transformers` or other packages fail to install, ensure your Conda environment has access to the `conda-forge` channel (`conda config --add channels conda-forge`).
  - For large CV datasets, ensure your system has sufficient memory, as `sentence-transformers` can be resource-intensive.
- **Git Integration**: Update your `README.md` to include Conda setup instructions:
  ```markdown
  ## Setup with Conda
  1. Install Conda (e.g., Miniconda).
  2. Create the environment:
     ```bash
     conda env create -f environment.yml
     ```
  3. Activate the environment:
     ```bash
     conda activate cv_predictor
     ```
  4. Run the pipeline:
     ```bash
     python main.py
     ```
  ```

- **Bilingual Support**: The project already handles Spanish and English CVs, so no changes are needed there. The `sentence-transformers` model (`paraphrase-multilingual-MiniLM-L12-v2`) supports both languages, and the extraction logic in `src/extract.py` accounts for bilingual keywords.

### Testing the Environment
After setting up, verify functionality:
```bash
conda activate cv_predictor
python -c "import pdfplumber, docx, pandas, numpy, sentence_transformers, sklearn, nltk, joblib, pytest; print('All dependencies imported successfully')"
pytest tests/
```

This will confirm that the environment is correctly configured and ready to process CVs.

